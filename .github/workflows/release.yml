name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe (VERSION)

      - name: Build DMG + PKG
        run: make release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MusicFormatSwitcher-*.dmg
            MusicFormatSwitcher-*.pkg
          body: |
            ## Music Format Switcher

            Automatically switches the audio device's sample rate and bit depth
            to match the currently playing Apple Music track.

            ### Installation

            **DMG** — recommended:
            1. Open the DMG
            2. Drag the app into the _Applications_ folder

            **PKG** — alternative:
            1. Open the PKG and follow the installer

            ### Gatekeeper

            This app is not notarized. macOS 15 and later block unnotarized downloads and no longer allow a simple right-click → Open workaround.

            **Easiest fix — remove the quarantine flag before opening:**
            ```bash
            xattr -cr ~/Downloads/MusicFormatSwitcher-*.dmg
            ```

            **Alternative:** After macOS blocks the app, open **System Settings → Privacy & Security**, scroll down to the blocked-app notice, and click **Open Anyway**.
