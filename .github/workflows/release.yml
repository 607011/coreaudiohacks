name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe (VERSION)

      - name: Build DMG + PKG
        run: make release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MusicFormatSwitcher-*.dmg
            MusicFormatSwitcher-*.pkg
          body: |
            ## Music Format Switcher

            Automatically switches the audio device's sample rate and bit depth
            to match the currently playing Apple Music track.

            ### Installation

            **DMG** — recommended:
            1. Open the DMG
            2. Drag the app into the _Applications_ folder
            3. Right-click the app → **Open** on first launch (required for Gatekeeper)

            **PKG** — alternative:
            1. Open the PKG and follow the installer
            2. Right-click the app → **Open** on first launch (required for Gatekeeper)

            > **Note:** This app is not notarized (no Apple Developer account).
            > macOS will show a warning on first launch — right-clicking and choosing Open is enough to proceed.
